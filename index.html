<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أخبار سويسرا الشرق · علي زهرة</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f6f3ee;
      padding: 1.2rem;
    }
    .container {
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .logo {
      font-size: 3.5rem;
      font-weight: 800;
      color: #2c241e;
      line-height: 1.2;
      margin-bottom: 0.2rem;
    }
    .sub {
      font-size: 1.4rem;
      font-weight: 600;
      color: #5c4e42;
      margin-bottom: 0.5rem;
    }
    .whatsapp-icon {
      font-size: 4rem;
      margin: 1.5rem 0;
      display: block;
      color: #25a75a;
    }
    .loading-text {
      color: #8a7b6e;
      font-size: 1rem;
      margin-top: 0.5rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      margin: 1.5rem auto;
      border: 4px solid #e8e0d8;
      border-top: 4px solid #25a75a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .manual-link {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #ad9b8c;
      word-break: break-all;
      background: #f8f5f1;
      padding: 0.5rem 1rem;
      border-radius: 12px;
      border: 1px solid #ece5de;
    }
    .manual-link a {
      color: #25a75a;
      text-decoration: none;
      font-weight: 600;
    }
    .manual-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">أخبار سويسرا الشرق</div>
    <div class="sub">علي زهرة</div>
    <span class="whatsapp-icon">📲</span>
    <div class="spinner"></div>
    <div class="loading-text">جاري التحويل إلى قناة واتساب ...</div>
    <div class="manual-link">
      <span>إذا لم يتم التحويل تلقائياً 👇</span><br />
      <a href="https://www.whatsapp.com/channel/0029Vb6JDeiFi8xdE2zu4N2F" target="_blank">
        اضغط هنا للانضمام
      </a>
    </div>
  </div>
  <script>
    window.location.href = "https://www.whatsapp.com/channel/0029Vb6JDeiFi8xdE2zu4N2F";
  </script>
</body>
</html>
