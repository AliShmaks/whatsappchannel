<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أخبار سويسرا الشرق - واتساب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#121212',
                            gray: '#1f1f1f',
                            accent: '#a3cc56',
                            muted: '#9ca3af',
                            whatsapp: '#25D366',
                            whatsappDark: '#128C7E',
                            whatsappLight: '#DCF8C6',
                        }
                    },
                    fontFamily: {
                        arabic: ['Noto Kufi Arabic', 'Manrope', 'sans-serif'],
                    },
                    letterSpacing: {
                        tighter: '-0.04em',
                        tight: '-0.02em',
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        html { scroll-behavior: smooth; }
        
        .glass-panel {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .whatsapp-glow {
            box-shadow: 0 0 60px rgba(37, 211, 102, 0.15), 0 0 120px rgba(37, 211, 102, 0.05);
        }

        .btn-whatsapp {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-whatsapp:hover {
            transform: scale(1.03) translateY(-2px);
            box-shadow: 0 20px 40px rgba(37, 211, 102, 0.3), 0 0 60px rgba(37, 211, 102, 0.15);
        }

        .pulse-ring {
            animation: pulseRing 2.5s ease-out infinite;
        }
        @keyframes pulseRing {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        .float-up {
            animation: floatUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(30px);
        }
        .float-up-delay-1 { animation-delay: 0.15s; }
        .float-up-delay-2 { animation-delay: 0.3s; }
        .float-up-delay-3 { animation-delay: 0.45s; }
        .float-up-delay-4 { animation-delay: 0.6s; }

        @keyframes floatUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .bg-mesh {
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(37, 211, 102, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(18, 140, 126, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(163, 204, 86, 0.04) 0%, transparent 50%),
                #0f0f0f;
        }

        .icon-float {
            animation: iconFloat 3s ease-in-out infinite;
        }
        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .line-draw {
            stroke-dasharray: 200;
            stroke-dashoffset: 200;
            animation: drawLine 1.5s ease-out 0.5s forwards;
        }
        @keyframes drawLine {
            to { stroke-dashoffset: 0; }
        }

        .shimmer {
            background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.05) 50%, transparent 70%);
            background-size: 200% 100%;
            animation: shimmer 3s ease-in-out infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="bg-mesh min-h-screen flex items-center justify-center font-arabic overflow-hidden relative">

    <!-- Decorative Background Elements -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <!-- Top-right decorative circles -->
        <div class="absolute -top-32 -left-32 w-96 h-96 rounded-full border border-white/[0.03]"></div>
        <div class="absolute -top-20 -left-20 w-72 h-72 rounded-full border border-white/[0.04]"></div>
        <div class="absolute -bottom-40 -right-40 w-[500px] h-[500px] rounded-full border border-brand-whatsapp/[0.05]"></div>
        <div class="absolute -bottom-24 -right-24 w-80 h-80 rounded-full border border-brand-whatsapp/[0.04]"></div>
        
        <!-- Floating dots -->
        <div class="absolute top-1/4 right-1/4 w-1 h-1 bg-brand-whatsapp/30 rounded-full" style="animation: iconFloat 4s ease-in-out infinite;"></div>
        <div class="absolute top-1/3 left-1/5 w-1.5 h-1.5 bg-brand-accent/20 rounded-full" style="animation: iconFloat 5s ease-in-out infinite 1s;"></div>
        <div class="absolute bottom-1/4 right-1/3 w-1 h-1 bg-white/10 rounded-full" style="animation: iconFloat 3.5s ease-in-out infinite 0.5s;"></div>
        <div class="absolute top-2/3 left-1/3 w-1 h-1 bg-brand-whatsapp/20 rounded-full" style="animation: iconFloat 4.5s ease-in-out infinite 1.5s;"></div>
    </div>

    <!-- Main Card -->
    <div class="relative z-10 w-full max-w-md mx-4">
        
        <!-- Card Container -->
        <div class="glass-panel whatsapp-glow rounded-3xl p-8 md:p-10 relative overflow-hidden">
            
            <!-- Shimmer overlay -->
            <div class="absolute inset-0 shimmer rounded-3xl pointer-events-none"></div>

            <!-- Top decorative line -->
            <div class="absolute top-0 right-0 left-0 h-[2px] bg-gradient-to-l from-transparent via-brand-whatsapp/50 to-transparent"></div>

            <!-- Content -->
            <div class="relative z-10 flex flex-col items-center text-center">

                <!-- WhatsApp Icon with Pulse -->
                <div class="float-up relative mb-6">
                    <div class="absolute inset-0 bg-brand-whatsapp/20 rounded-full pulse-ring"></div>
                    <div class="relative w-20 h-20 bg-gradient-to-br from-brand-whatsapp to-brand-whatsappDark rounded-2xl flex items-center justify-center shadow-lg shadow-brand-whatsapp/20 icon-float">
                        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="white">
                            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                        </svg>
                    </div>
                </div>

                <!-- Label -->
                <div class="float-up float-up-delay-1 mb-4">
                    <span class="inline-flex items-center gap-1.5 px-4 py-1.5 rounded-full bg-brand-whatsapp/10 border border-brand-whatsapp/20">
                        <span class="w-2 h-2 bg-brand-whatsapp rounded-full animate-pulse"></span>
                        <span class="text-[11px] font-bold text-brand-whatsapp tracking-wide uppercase">قناة نشطة</span>
                    </span>
                </div>

                <!-- Heading -->
                <h1 class="float-up float-up-delay-2 text-[28px] md:text-[32px] font-bold text-white leading-tight mb-3 tracking-tight">
                    انضم إلى قناتنا
                </h1>
                <h2 class="float-up float-up-delay-2 text-[22px] md:text-[26px] font-bold text-brand-whatsapp leading-tight mb-4 tracking-tight">
                    أخبار سويسرا الشرق
                </h2>

                <!-- Description -->
                <p class="float-up float-up-delay-3 text-brand-muted text-[14px] leading-relaxed mb-2 max-w-xs">
                    تابع آخر الأخبار والتحديثات من سويسرا الشرق مباشرة عبر واتساب
                </p>

                <!-- Author -->
                <div class="float-up float-up-delay-3 flex items-center gap-3 mb-8 mt-4">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-brand-gray to-brand-dark border border-white/10 flex items-center justify-center">
                        <i data-lucide="user" class="w-5 h-5 text-white/60"></i>
                    </div>
                    <div class="text-right">
                        <p class="text-white text-sm font-semibold">علي زهرة</p>
                        <p class="text-brand-muted text-xs">مدير القناة</p>
                    </div>
                </div>

                <!-- CTA Button -->
                <a href="https://www.whatsapp.com/channel/0029Vb6JDeiFi8xdE2zu4N2F" 
                   target="_blank" 
                   rel="noopener noreferrer"
                   class="float-up float-up-delay-4 btn-whatsapp w-full flex items-center justify-center gap-3 py-4 px-8 rounded-2xl text-white font-bold text-[15px]">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="white">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                    </svg>
                    انضم الآن 
                </a>

                <!-- Sub text -->
                <p class="float-up float-up-delay-4 text-brand-muted/50 text-[11px] mt-4">
                   إشعارات فورية · محتوى حصري
                </p>
            </div>

            <!-- Bottom decorative line -->
            <div class="absolute bottom-0 right-0 left-0 h-[1px] bg-gradient-to-l from-transparent via-white/10 to-transparent"></div>
        </div>

        <!-- Bottom watermark -->
        <p class="text-center text-white/10 text-[10px] mt-6 font-medium tracking-wider">
            WHATSAPP CHANNEL
        </p>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
